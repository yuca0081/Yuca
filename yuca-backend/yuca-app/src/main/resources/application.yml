spring:
  application:
    name: Yuca
  profiles:
    active: ai

  # PostgreSQL配置
  datasource:
    url: jdbc:postgresql://47.94.247.12:5432/yuca?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: postgres
    driver-class-name: org.postgresql.Driver
  # Redis配置
  data:
    redis:
      host: 47.94.247.12
      port: 6379
      password: CY810051
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 3600000
  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
      file-size-threshold: 2MB

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: org.yuca.yuca.user.entity,org.yuca.yuca.assistant.entity

# 日志配置
logging:
  level:
    root: WARN
    org.springframework.web: WARN
    org.yuca.yuca: INFO
    org.yuca.yuca.common.exception: ERROR
    org.yuca.yuca.knowledge: DEBUG
    REQUEST_LOGGER: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{36}) - %msg%n"

server:
  port: 8500
  servlet:
    context-path: /api
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 300000
    connection-max-retention-time: 300s
    # 启用SSE流式传输的关键配置
    processor-cache: 200
    # 禁用写缓冲，确保SSE实时发送
    keep-alive-timeout: 300000
    max-connections: 8192
    accept-count: 100
  # 禁用响应压缩（SSE需要）
  compression:
    enabled: false

# JWT配置
jwt:
  secret: YucaAppSecretKey2025MustBeAtLeast256BitsLongForHS256Algorithm
  access-token-expiration: 86400000          # 24小时
  refresh-token-expiration: 2592000000       # 30天
  remember-me-expiration: 604800000          # 7天
  header: Authorization
  prefix: "Bearer "
  issuer: yuca

# 登录策略
login:
  lock-duration: 180000

# MinIO配置
minio:
  endpoint: http://47.94.247.12:9000
  access-key: minioadmin
  secret-key: minioadmin
  region: cn-north-1
  bucket-name: yuca
  max-file-size: 50MB

# OpenAI配置（可选，如果使用OpenAI）
# openai:
#   api-key: your-openai-api-key
#   base-url: https://api.openai.com/v1

# Swagger/OpenAPI配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: org.yuca.yuca.user.controller, org.yuca.yuca.infrastructure.storage.controller, org.yuca.yuca.knowledge.controller, org.yuca.yuca.assistant.controller
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

# 小助手模块配置
assistant:
  max-context-messages: 20      # 上下文消息最大数量
  stream-timeout: 60000         # SSE流式响应超时时间（毫秒）
